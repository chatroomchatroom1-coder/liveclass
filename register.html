<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <div class="auth-container">
        <div class="glass-panel auth-box">
            <h2>Register</h2>
            <form id="registerForm">
                <input type="text" id="fullname" placeholder="Full Name" required>
                <input type="email" id="email" placeholder="Email" required>
                <input type="password" id="password" placeholder="Password (min 6)" required>
                <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 15px;">Register</button>
            </form>
            <p style="margin-top: 15px;">Have account? <a href="login.html">Login</a></p>
        </div>
    </div>
    
    <script src="js/config.js"></script>
    <script>
        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault(); // Ye form ko reload hone se rokega
            
            const fullname = document.getElementById('fullname').value;
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            
            // Step 1: User create karo
            const { data, error } = await supabaseClient.auth.signUp({ 
                email: email, 
                password: password 
            });
            
            if (error) {
                alert("Error: " + error.message);
                return;
            }
            
            // Step 2: Database table me name save karo
            if (data.user) {
                const { error: dbError } = await supabaseClient.from('users').insert([
                    { id: data.user.id, email: email, full_name: fullname }
                ]);
                
                if (dbError) {
                    alert("Database Error: " + dbError.message);
                    return;
                }
                
                alert("Account ban gaya! Ab login karein.");
                location.href = 'login.html';
            }
        });
    </script>
</body>
</html>
