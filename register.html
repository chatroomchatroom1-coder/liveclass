<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <div class="auth-container">
        <div class="glass-panel auth-box">
            <h2>Register</h2>
            <form id="registerForm">
                <input type="text" id="fullname" placeholder="Full Name" required>
                <input type="email" id="email" placeholder="Email" required>
                <input type="password" id="password" placeholder="Password (min 6)" required>
                <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 15px;">Register</button>
            </form>
            <p style="margin-top: 15px;">Have account? <a href="login.html">Login</a></p>
        </div>
    </div>
    <script src="js/config.js"></script>
    <script src="js/auth.js"></script>
</body>
</html>
