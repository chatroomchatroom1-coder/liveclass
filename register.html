<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register</title>
    <link rel="stylesheet" href="css/style.css">
    <!-- Supabase ki file -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <div class="auth-container">
        <div class="glass-panel auth-box">
            <h2>Register</h2>
            <form id="registerForm">
                <input type="text" id="fullname" placeholder="Full Name" required>
                <input type="email" id="email" placeholder="Email" required>
                <input type="password" id="password" placeholder="Password (min 6)" required>
                <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 15px;">Register</button>
            </form>
            <p style="margin-top: 15px;">Have account? <a href="login.html">Login</a></p>
        </div>
    </div>
    
    <script>
        // ======= APNA URL AUR KEY YAHAN DALEIN =======
        const SUPABASE_URL = "https://mzdqpcqckaikvwaosmfv.supabase.co/rest/v1/"; 
        const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im16ZHFwY3Fja2Fpa3Z3YW9zbWZ2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODAwNTEyOTIsImV4cCI6MjA5NTYyNzI5Mn0.IVyfSRazLjJizR5k1YStty83t0k9u7jHkuIEOnPodoI";
        // =============================================

        const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            // Check karne ke liye ki button kaam kar raha hai
            alert("Wait kijiye, Account ban raha hai..."); 
            
            const fullname = document.getElementById('fullname').value;
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            
            // 1. Account banayein
            const { data: authData, error: authError } = await supabaseClient.auth.signUp({ 
                email: email, 
                password: password 
            });
            
            if (authError) {
                alert("Error aagaya: " + authError.message);
                return;
            }
            
            // 2. Naam save karein
            if (authData.user) {
                const { error: dbError } = await supabaseClient.from('users').insert([
                    { id: authData.user.id, email: email, full_name: fullname, role: 'student' }
                ]);
                
                if (dbError) {
                    alert("Account ban gaya, par naam save nahi hua.");
                } else {
                    alert("Success! Account ban gaya! Ab login karein.");
                    location.href = 'login.html';
                }
            }
        });
    </script>
</body>
</html>
